<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Everyday Ham - Host Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  /* ============================================================
     THE EVERYDAY HAM - HOST TRACKER  (v2: 72-hour history board)
     Portrait digital signage: 1080 wide x 1920 tall (DakBoard)
     Non-interactive, display only.
     ============================================================ */

  :root {
    --navy:        #152333;
    --navy-dark:   #0d1620;
    --navy-light:  #1e3347;
    --orange:      #ff7030;
    --cream:       #fdf8e5;
    --cream-80:    rgba(253, 248, 229, 0.80);
    --cream-50:    rgba(253, 248, 229, 0.50);
    --cream-30:    rgba(253, 248, 229, 0.30);
    --good:        #2ecc71;
    --warn:        #f39c12;
    --bad:         #e74c3c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: var(--navy-dark);
    color: var(--cream);
    font-family: 'Source Sans Pro', sans-serif;
  }

  #stage {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(1200px 700px at 12% -8%, rgba(255,112,48,0.10), transparent 60%),
      radial-gradient(1000px 700px at 100% 108%, rgba(255,112,48,0.08), transparent 60%),
      linear-gradient(160deg, var(--navy-light) 0%, var(--navy) 42%, var(--navy-dark) 100%);
  }

  /* ---------- Header ---------- */
  header {
    flex: 0 0 auto;
    padding: 34px 40px 22px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .brand .kicker {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 6px;
    font-size: 22px;
    color: var(--orange);
    text-transform: uppercase;
  }
  .brand .title {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: 58px;
    line-height: 1;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .brand .title b { font-weight: 600; }
  .clock { text-align: right; }
  .clock .zulu {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 46px;
    line-height: 1;
    letter-spacing: 2px;
  }
  .clock .zulu .z {
    color: var(--orange);
    font-size: 26px;
    vertical-align: 6px;
    margin-left: 4px;
  }
  .clock .local {
    font-size: 20px;
    color: var(--cream-50);
    letter-spacing: 1px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .rule {
    height: 2px;
    margin: 0 40px;
    background: linear-gradient(90deg, var(--orange) 0%, rgba(255,112,48,0.35) 30%, rgba(255,112,48,0) 88%);
  }

  /* ---------- Map region ---------- */
  #mapwrap {
    position: relative;
    flex: 1 1 auto;
    margin: 22px 40px 18px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  }
  #map { position: absolute; inset: 0; background: #e9eef2; }
  #map .leaflet-container { background: #e9eef2; }

  /* Gentle navy frame; light enough that labels stay readable. */
  #mapwrap::after {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 90px 18px rgba(13,22,32,0.30);
    background:
      radial-gradient(125% 95% at 50% 50%, transparent 68%, rgba(13,22,32,0.20) 100%);
  }

  #trails, #avatars {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  #trails { z-index: 400; }
  #avatars { z-index: 401; }

  /* ---------- Host markers ---------- */
  .host-marker {
    position: absolute;
    left: 0; top: 0;
    width: 0; height: 0;
    will-change: transform;
  }
  .host-marker .center {
    position: absolute;
    left: 0; top: 0;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .host-ring {
    position: absolute;
    left: 50%; top: 0;
    width: 64px; height: 64px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 2px solid var(--hc);
    opacity: 0;
  }
  .host-marker.rolling .host-ring {
    opacity: 0.55;
    animation: ringpulse 1.8s ease-out infinite;
  }
  @keyframes ringpulse {
    0%   { transform: translate(-50%,-50%) scale(0.65); opacity: 0.6; }
    70%  { opacity: 0; }
    100% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
  }
  .host-beam {
    position: absolute;
    left: 50%; top: 0;
    width: 0; height: 0;
    transform: translate(-50%, -50%) rotate(var(--course, 0deg));
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .host-beam::before {
    content: "";
    position: absolute;
    left: -9px; top: -46px;
    width: 0; height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-bottom: 18px solid var(--hc);
    filter: drop-shadow(0 0 6px var(--hc));
  }
  .host-marker.rolling .host-beam { opacity: 0.95; }

  .host-body { position: relative; z-index: 2; will-change: transform; }
  .host-marker.rolling .host-body { animation: bob 0.85s ease-in-out infinite; }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }
  .host-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--hc);
    border: 3px solid var(--cream);
    box-shadow: 0 0 14px rgba(0,0,0,0.55), 0 0 18px var(--hc);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 20px;
    color: var(--navy-dark);
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }
  .host-avatar img.pose { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .host-avatar:not(.imgloaded) img.pose { display: none; }
  .host-avatar.imgloaded .ini { display: none; }
  /* Not-heard markers fade gently (readable, but clearly "asleep").
     Old values were grayscale(0.7) / opacity 0.55, which washed out badly. */
  .host-marker.dim .host-avatar {
    filter: grayscale(0.35);
    opacity: 0.82;
    box-shadow: 0 0 14px rgba(0,0,0,0.55);
  }
  .host-tag {
    margin-top: 5px;
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 1px;
    color: var(--cream);
    background: rgba(13,22,32,0.72);
    border: 1px solid var(--hc);
    padding: 1px 8px;
    border-radius: 6px;
    white-space: nowrap;
  }

  /* ---------- Map overlays ---------- */
  .map-legend {
    position: absolute;
    left: 16px; top: 16px;
    z-index: 402;
    background: rgba(13,22,32,0.9);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .map-legend .lh {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 8px;
  }
  .legend-row { display: flex; align-items: center; gap: 9px; margin: 5px 0; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 8px var(--d); background: var(--d); }
  .legend-name { font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 16px; letter-spacing: 0.5px; }
  .legend-call { font-size: 12px; color: var(--cream-50); letter-spacing: 0.5px; }

  .window-badge {
    position: absolute;
    right: 16px; top: 16px;
    z-index: 402;
    background: rgba(13,22,32,0.9);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    padding: 8px 16px;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 2px;
    font-size: 16px;
    text-transform: uppercase;
    color: var(--cream-80);
  }
  .window-badge b { color: var(--orange); font-weight: 600; }

  /* Age scale: fresh (green) -> 3 days (red) */
  .age-legend {
    position: absolute;
    left: 16px; bottom: 14px;
    z-index: 402;
    background: rgba(13,22,32,0.9);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 10px 14px;
    width: 240px;
  }
  .age-legend .lh {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 7px;
  }
  .age-bar {
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(90deg, rgba(253,248,229,0.95) 0%, rgba(253,248,229,0.10) 100%);
  }
  .age-ends {
    display: flex;
    justify-content: space-between;
    margin-top: 5px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--cream-50);
  }

  /* ---------- Bottom status cards ---------- */
  #cards {
    flex: 0 0 auto;
    padding: 0 40px 10px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .card {
    position: relative;
    display: grid;
    grid-template-columns: 62px 1fr auto;
    align-items: center;
    gap: 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    border-left: 6px solid var(--hc);
    border-radius: 14px;
    padding: 16px 22px 16px 20px;
  }
  .card .avatar {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: var(--hc);
    border: 3px solid var(--cream);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 21px;
    color: var(--navy-dark);
    box-shadow: 0 0 14px var(--hc);
    position: relative;
    overflow: hidden;
  }
  .card .avatar img.pose { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .card .avatar:not(.imgloaded) img.pose { display: none; }
  .card .avatar.imgloaded .ini { display: none; }
  .card.notheard .avatar { filter: grayscale(0.35); opacity: 0.82; box-shadow: 0 0 14px rgba(0,0,0,0.4); }
  .card .who { min-width: 0; }
  .card .call {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 30px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .card .name { font-size: 18px; color: var(--cream-80); margin-top: 5px; letter-spacing: 0.3px; }
  .card .heard { font-size: 15px; color: var(--cream-50); margin-top: 3px; letter-spacing: 0.3px; text-transform: uppercase; }

  .card .metrics {
    display: flex;
    gap: 26px;
    align-items: center;
    text-align: right;
  }
  .metric .val {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: 34px;
    line-height: 1;
  }
  .metric .val small { font-size: 16px; color: var(--cream-50); font-weight: 400; margin-left: 3px; }
  .metric .lbl {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--cream-50);
    margin-top: 6px;
  }
  .state-pill {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid currentColor;
  }
  .state-pill .sd { width: 9px; height: 9px; border-radius: 50%; background: currentColor; }
  .state-ROLLING { color: var(--good); }
  .state-PARKED  { color: var(--warn); }
  .state-HOME    { color: var(--orange); }
  .state-NOTHEARD{ color: var(--cream-50); }

  /* ---------- Footer ---------- */
  footer {
    flex: 0 0 auto;
    padding: 8px 40px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 15px;
    color: var(--cream-50);
    letter-spacing: 0.4px;
  }
  footer .src { display: flex; align-items: center; gap: 10px; }
  .stale-badge {
    display: none;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-size: 13px;
    color: var(--bad);
    border: 1px solid var(--bad);
    border-radius: 6px;
    padding: 3px 9px;
  }
  .stale-badge.show { display: inline-block; }

  .leaflet-control-attribution {
    background: rgba(13,22,32,0.6) !important;
    color: var(--cream-50) !important;
    font-size: 10px !important;
  }
  .leaflet-control-attribution a { color: var(--cream-80) !important; }
</style>
</head>
<body>
<div id="stage">

  <header>
    <div class="brand">
      <div class="kicker">The Everyday Ham</div>
      <div class="title">Host <b>Tracker</b></div>
    </div>
    <div class="clock">
      <div class="zulu" id="zulu">--:--:--<span class="z">Z</span></div>
      <div class="local" id="local">--</div>
    </div>
  </header>

  <div class="rule"></div>

  <div id="mapwrap">
    <div id="map"></div>
    <canvas id="trails"></canvas>
    <div id="avatars"></div>

    <div class="map-legend" id="legend">
      <div class="lh">On the air</div>
    </div>

    <div class="window-badge">Last <b>72</b> hours</div>

    <div class="age-legend">
      <div class="lh">Trail age</div>
      <div class="age-bar"></div>
      <div class="age-ends"><span>Now</span><span>3 days</span></div>
    </div>
  </div>

  <div id="cards"></div>

  <footer>
    <div class="src">
      <span id="srcText">Simulated data</span>
      <span class="stale-badge" id="staleBadge">Stale</span>
    </div>
    <div id="updated">Last update --</div>
  </footer>

</div>

<script>
/* ============================================================
   CONFIG  -  tune everything here
   ============================================================ */

const DATA_URL        = 'host-tracker.json';
const FORCE_SIMULATED = false;   // set true to always use the demo data

// Home base of the show. "From home" on the cards is measured per host;
// Clarkston anchors the fallback view when nobody has data yet.
const CLARKSTON = { lat: 42.7356, lng: -83.4183 };

// Roster. `call` must match the poller output keys (base callsigns).
const HOSTS = [
  { call: 'K8JKU', name: 'James', color: '#4a90e2', initials: 'JA',
    home: { lat: 42.7356, lng: -83.4183 },                          // Clarkston
    poses: { home: 'icons/james-home.png', portable: 'icons/james-portable.png', mobile: 'icons/james-mobile.png' } },

  { call: 'N8JRD', name: 'Jim', color: '#e74c3c', initials: 'JI',
    home: { lat: 42.4606, lng: -83.6516 },                          // South Lyon
    poses: { home: 'icons/jim-home.png', portable: 'icons/jim-portable.png', mobile: 'icons/jim-mobile.png' } },

  { call: 'W8KNX', name: 'Rory', color: '#9b59b6', initials: 'RO',
    home: { lat: 42.4606, lng: -83.6516 },                          // South Lyon
    poses: { home: 'icons/rory-home.png', portable: 'icons/rory-portable.png', mobile: 'icons/rory-mobile.png' } },
];

// Timing / behaviour
const MASTER_TICK_MS = 1000;   // single master tick: clock, cards, poll cadence
const POLL_SECONDS   = 120;    // how often to re-fetch the snapshot
const TRAIL_HOURS    = 72;     // history window (3 days). Match the poller.
const FRESH_MINUTES  = 10;     // beacon this recent -> vivid green trail head
const STALE_MINUTES  = 45;     // no beacon this long -> NOT HEARD
const DATA_STALE_MIN = 20;     // snapshot older than this -> footer stale badge

// Classification
const MOVING_SPEED_KMH = 8;    // above this a station is ROLLING
const HOME_RADIUS_KM   = 0.4;  // within this of `home` -> HOME (else PARKED)

// Display units
const KM_TO_MI = 0.621371;

// Rendering (Pi 5 has headroom; drop RENDER_FPS to 15-20 on weak hardware)
const RENDER_FPS   = 30;
const TRAIL_WIDTH  = 4;        // age-colored core line
const CASING_WIDTH = 9;        // host-color identity casing under the core
const CASING_ALPHA = 0.30;
const PULSE_PERIOD_S = 14;     // seconds for the traveling pulse to run a trail
const MIDNIGHT_TICKS = true;   // small cream dots at each local midnight
const TRAIL_OFFSET_PX = 7;     // sideways separation between hosts' trails so
                               // shared roads render as parallel ribbons
                               // (transit-map style). 0 disables.

const MODE_PALETTE = ['#ff7030', '#4a90e2', '#9b59b6', '#2ecc71'];

// Basemap. Voyager is light and readable (same as the POTA boards).
// Alternatives (all free, no API key):
//   Positron (neutral light grey): https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png
const MAP_TILES  = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
const MAP_ATTRIB = '&copy; OpenStreetMap &copy; CARTO';

// Auto-zoom: tightest zoom that fits the chosen content.
const FIT_MODE          = 'trails'; // 'trails' = whole 72h paths stay on screen.
                                    // 'people' = only current positions (tighter).
const FIT_MAX_ZOOM      = 14;
const FIT_PADDING_PX    = 80;
const FIT_FALLBACK_ZOOM = 11;
const AUTO_REFIT        = true;

/* ============================================================
   STATE
   ============================================================ */
let map, trailCanvas, ctx, avatarLayer;
let hosts = [];
let dataGeneratedMs = 0;
let sourceLabel = 'Simulated data';
let lastSignature = '';
let lastFitSig = '';
let tickCount = 0;
let lastDrawMs = 0;
const FRAME_MIN_MS = 1000 / RENDER_FPS;

/* ============================================================
   GEO HELPERS
   ============================================================ */
function haversineKm(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const la1 = a.lat * Math.PI / 180, la2 = b.lat * Math.PI / 180;
  const h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
}
function compass(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg/45) % 8];
}

/* ============================================================
   CITY LOOKUP (offline, no API)
   The state pill shows the city a host was last reported in.
   Nearest entry wins. Dense around SE Michigan, with wider
   Michigan coverage for road trips and POTA runs. Add rows
   freely; format is [name, lat, lng].
   ============================================================ */
const CITIES = [
  // Oakland / home turf
  ['Clarkston',42.7356,-83.4183],['Waterford',42.6931,-83.4083],['White Lake',42.6530,-83.5350],

  ['South Lyon',42.4606,-83.6516],['Northville',42.4311,-83.4833],['Farmington Hills',42.4989,-83.3677],

  ['Pontiac',42.6389,-83.2910],['Auburn Hills',42.6875,-83.2341],['Rochester',42.6806,-83.1338],
  ['Rochester Hills',42.6580,-83.1499],['Troy',42.6064,-83.1498],['Royal Oak',42.4895,-83.1446],
  ['Ferndale',42.4603,-83.1346],['Southfield',42.4734,-83.2219],['Lake Orion',42.7845,-83.2397],
  ['Oxford',42.8245,-83.2647],['Ortonville',42.8522,-83.4430],['Holly',42.7920,-83.6277],
  // Genesee / Livingston / Lapeer
  ['Fenton',42.7978,-83.7049],['Linden',42.8142,-83.7827],['Grand Blanc',42.9275,-83.6300],
  ['Flint',43.0125,-83.6875],['Davison',43.0345,-83.5180],['Lapeer',43.0514,-83.3188],
  ['Imlay City',43.0247,-83.0777],['Brighton',42.5295,-83.7802],['Howell',42.6073,-83.9294],
  ['Hartland',42.6428,-83.7500],['Pinckney',42.4570,-83.9480],['Fowlerville',42.6606,-84.0730],
  // Wayne / Washtenaw / Monroe
  ['Detroit',42.3314,-83.0458],['Dearborn',42.3223,-83.1763],['Livonia',42.3684,-83.3527],
  ['Plymouth',42.3714,-83.4702],['Canton',42.3087,-83.4821],['Westland',42.3242,-83.4002],
  ['Ann Arbor',42.2808,-83.7430],['Ypsilanti',42.2411,-83.6129],['Dexter',42.3384,-83.8897],
  ['Chelsea',42.3180,-84.0205],['Saline',42.1668,-83.7813],['Monroe',41.9165,-83.3977],
  // Macomb / St. Clair / Thumb
  ['Sterling Heights',42.5803,-83.0302],['Warren',42.5145,-83.0147],['Utica',42.6261,-83.0335],
  ['Romeo',42.8028,-83.0130],['Mount Clemens',42.5973,-82.8780],['Port Huron',42.9709,-82.4249],
  ['Sandusky',43.4203,-82.8296],['Bad Axe',43.8017,-82.9994],['Caro',43.4909,-83.3983],
  ['Port Austin',44.0445,-82.9938],

function nearestCity(p) {
  let best = null, bestKm = Infinity;
  for (const [name, lat, lng] of CITIES) {
    const km = haversineKm(p, { lat, lng });
    if (km < bestKm) { bestKm = km; best = name; }
  }
  return best || '--';
}

/* ============================================================
   COLOR HELPERS
   ============================================================ */
function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}
function rgba(rgb, a) { return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a})`; }
function hexA(hex, a) { return rgba(hexToRgb(hex), a); }

/* ============================================================
   SIMULATED DATA  (72h)
   A believable 3-day demo so the board runs before the poller
   populates. The daily schedule repeats with slight variation.
   ============================================================ */
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// One day of keyframes per host: [minuteOfDay, lat, lng]
const SIM_SCHEDULES = {
  'K8JKU': [
    [0,   42.7356,-83.4183],[600, 42.7356,-83.4183],
    [660, 42.7942,-83.6247],[780, 42.7942,-83.6247],
    [840, 42.8517,-83.4430],[960, 42.8517,-83.4430],
    [1080,42.7356,-83.4183],[1440,42.7356,-83.4183]
  ],
  'N8JRD': [
    [0,   42.4606,-83.6516],[420, 42.4606,-83.6516],
    [510, 42.4895,-83.1446],[960, 42.4895,-83.1446],
    [1050,42.4606,-83.6516],[1440,42.4606,-83.6516]
  ],
  'W8KNX': [
    [0,   42.4606,-83.6516],[720, 42.4606,-83.6516],
    [750, 42.5251,-83.7791],[810, 42.5251,-83.7791],
    [840, 42.4606,-83.6516],[1440,42.4606,-83.6516]
  ]
};

function sampleSchedule(sched, minute) {
  if (minute <= sched[0][0]) return { lat: sched[0][1], lng: sched[0][2] };
  const last = sched[sched.length-1];
  if (minute >= last[0]) return { lat: last[1], lng: last[2] };
  for (let i = 0; i < sched.length-1; i++) {
    const a = sched[i], b = sched[i+1];
    if (minute >= a[0] && minute <= b[0]) {
      const f = (minute - a[0]) / (b[0] - a[0]);
      return { lat: a[1] + (b[1]-a[1])*f, lng: a[2] + (b[2]-a[2])*f };
    }
  }
  return { lat: last[1], lng: last[2] };
}

function bearingDeg(a, b) {
  const y = Math.sin((b.lng-a.lng)*Math.PI/180) * Math.cos(b.lat*Math.PI/180);
  const x = Math.cos(a.lat*Math.PI/180)*Math.sin(b.lat*Math.PI/180) -
            Math.sin(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.cos((b.lng-a.lng)*Math.PI/180);
  return (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
}

function buildSimulated() {
  const now = Date.now();
  const totalMin = TRAIL_HOURS * 60;
  const stepMin = 6;
  const roster = HOSTS.map((h, hi) => {
    const rand = mulberry32(0x9E37 + hi*7919);
    const sched = SIM_SCHEDULES[h.call] || [[0,h.home.lat,h.home.lng],[1440,h.home.lat,h.home.lng]];
    const track = [];
    let prev = null;
    for (let m = 0; m <= totalMin; m += stepMin) {
      const dayMin = m % 1440;
      const p = sampleSchedule(sched, dayMin);
      const moving = prev && haversineKm(prev, p) > 0.02;
      const jitter = moving ? 0.0016 : 0.00025;
      const lat = p.lat + (rand()-0.5)*jitter;
      const lng = p.lng + (rand()-0.5)*jitter;
      const time = now - (totalMin - m)*60000;
      let speed = 0, course = 0;
      if (prev) {
        const distKm = haversineKm(prev, { lat, lng });
        speed = distKm / (stepMin/60);
        if (distKm > 0.03) course = bearingDeg(prev, { lat, lng });
        else course = prev.course || 0;
      }
      const pt = { time, lat, lng, speed, course };
      track.push(pt);
      prev = pt;
    }
    return { call: h.call, name: h.name, color: h.color,
             initials: h.initials, home: h.home, poses: h.poses, track };
  });
  return { generated: now, source: 'Simulated data', hosts: roster };
}

/* ============================================================
   DATA LOADING
   Snapshot schema (what the poller writes):
   {
     "generated": 1782939161,                  // unix seconds (or ISO8601)
     "hosts": [
       { "callsign": "K8JKU",
         "track": [ { "time": 1782866807,
                      "lat": 42.73, "lng": -83.41,
                      "speed": 0, "course": 0 } ] }  // speed km/h, course deg
     ]
   }
   Roster metadata (name/color/poses/home) lives in HOSTS above.
   ============================================================ */
function parseTime(t) {
  if (typeof t === 'number') return t < 1e12 ? t*1000 : t;
  let s = String(t);
  if (!/[zZ]|[+\-]\d\d:?\d\d$/.test(s)) s += 'Z';
  return Date.parse(s);
}

async function loadData() {
  if (FORCE_SIMULATED) return applyData(buildSimulated());
  try {
    const res = await fetch(DATA_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('http ' + res.status);
    const raw = await res.json();
    const genMs = parseTime(raw.generated || Date.now());
    const cutoff = Date.now() - TRAIL_HOURS*3600*1000;
    let anyPoints = false;
    const roster = HOSTS.map(h => {
      const rec = (raw.hosts || []).find(x => (x.callsign || x.call) === h.call);
      const track = ((rec && rec.track) || [])
        .map(p => ({ time: parseTime(p.time), lat: +p.lat, lng: +p.lng,
                     speed: +p.speed || 0, course: +p.course || 0 }))
        .filter(p => p.time >= cutoff)
        .sort((a,b) => a.time - b.time);
      if (track.length) anyPoints = true;
      return { call: h.call, name: h.name, color: h.color,
               initials: h.initials, home: h.home, poses: h.poses, track };
    });
    if (!anyPoints && !hosts.length) return applyData(buildSimulated());
    applyData({ generated: genMs, source: 'Live via aprs.fi', hosts: roster });
  } catch (e) {
    if (!hosts.length) applyData(buildSimulated());
    else sourceLabel = 'Simulated data';
  }
}

function applyData(data) {
  const sig = data.hosts.map(h => {
    const last = h.track[h.track.length-1];
    return h.call + ':' + (last ? Math.round(last.time/1000)+','+h.track.length : '0');
  }).join('|');

  hosts = data.hosts.map((h, i) => ({
    ...h, color: h.color || MODE_PALETTE[i % MODE_PALETTE.length]
  }));
  dataGeneratedMs = data.generated;
  sourceLabel = data.source || sourceLabel;

  if (sig !== lastSignature) {
    buildLegend();
    buildCards();
    lastSignature = sig;
  }

  if (AUTO_REFIT && map) {
    const fsig = fitSignature();
    if (fsig !== lastFitSig) { lastFitSig = fsig; frameBounds(); }
  }
}

function initMap() {
  map = L.map('map', {
    zoomControl: false, attributionControl: true,
    dragging: false, scrollWheelZoom: false, doubleClickZoom: false,
    boxZoom: false, keyboard: false, touchZoom: false, tap: false,
    inertia: false, zoomSnap: 0.1
  });
  L.tileLayer(MAP_TILES, {
    subdomains: 'abcd', maxZoom: 19,
    attribution: MAP_ATTRIB
  }).addTo(map);

  trailCanvas = document.getElementById('trails');
  ctx = trailCanvas.getContext('2d');
  avatarLayer = document.getElementById('avatars');

  sizeCanvas();
  window.addEventListener('resize', () => { sizeCanvas(); frameBounds(); });
}

function sizeCanvas() {
  const w = document.getElementById('mapwrap').clientWidth;
  const h = document.getElementById('mapwrap').clientHeight;
  const dpr = window.devicePixelRatio || 1;
  trailCanvas.width = w * dpr;
  trailCanvas.height = h * dpr;
  trailCanvas.style.width = w + 'px';
  trailCanvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function getFitPoints() {
  const pts = [];
  hosts.forEach(h => {
    if (!h.track || !h.track.length) return;
    if (FIT_MODE === 'trails') h.track.forEach(p => pts.push([p.lat, p.lng]));
    else {
      const last = h.track[h.track.length - 1];
      pts.push([last.lat, last.lng]);
    }
  });
  return pts;
}

function fitSignature() {
  return hosts.map(h => {
    const p = h.track && h.track.length ? h.track[h.track.length - 1] : null;
    return h.call + (p ? ':' + p.lat.toFixed(3) + ',' + p.lng.toFixed(3) + ',' + h.track.length : ':-');
  }).join('|') + '|' + FIT_MODE;
}

function frameBounds() {
  const pts = getFitPoints();
  if (!pts.length) {
    map.setView([CLARKSTON.lat, CLARKSTON.lng], FIT_FALLBACK_ZOOM);
    return;
  }
  const b = L.latLngBounds(pts);
  if (b.getNorthEast().equals(b.getSouthWest())) {
    map.setView(b.getCenter(), FIT_MAX_ZOOM, { animate: false });
  } else {
    map.fitBounds(b, {
      padding: [FIT_PADDING_PX, FIT_PADDING_PX],
      maxZoom: FIT_MAX_ZOOM,
      animate: false
    });
  }
}

/* ============================================================
   POSE SELECTION
   ============================================================ */
function poseFor(host, state) {
  const p = host.poses;
  if (!p) return null;
  const order = ({
    ROLLING:  ['mobile', 'portable', 'home'],
    PARKED:   ['portable', 'home', 'mobile'],
    HOME:     ['home', 'portable', 'mobile'],
    NOTHEARD: ['home', 'portable', 'mobile'],
  })[state] || ['home', 'portable', 'mobile'];
  for (const k of order) if (p[k]) return p[k];
  for (const k in p) if (p[k]) return p[k];
  return null;
}

function setPose(avatarEl, url) {
  if (!avatarEl) return;
  if (!url) { avatarEl.classList.remove('imgloaded'); avatarEl._pose = null; return; }
  if (avatarEl._pose === url) return;
  avatarEl._pose = url;
  const img = avatarEl.querySelector('img.pose');
  if (!img) return;
  img.onload  = () => { if (avatarEl._pose === url) avatarEl.classList.add('imgloaded'); };
  img.onerror = () => { if (avatarEl._pose === url) avatarEl.classList.remove('imgloaded'); };
  img.src = url;
}

/* ============================================================
   PER-HOST DERIVED STATE (current, history-focused)
   ============================================================ */
function deriveHost(h) {
  const track = h.track;
  if (!track || !track.length) return { empty: true };

  const latest = track[track.length-1];
  const ageMin = (Date.now() - latest.time) / 60000;
  const distHome = haversineKm(latest, h.home) * KM_TO_MI;

  let miles = 0, farthest = 0;
  for (let i = 0; i < track.length; i++) {
    if (i > 0) miles += haversineKm(track[i-1], track[i]);
    const d = haversineKm(track[i], h.home);
    if (d > farthest) farthest = d;
  }
  miles *= KM_TO_MI;
  farthest *= KM_TO_MI;

  let state;
  if (ageMin > STALE_MINUTES) state = 'NOTHEARD';
  else if (latest.speed > MOVING_SPEED_KMH) state = 'ROLLING';
  else if (haversineKm(latest, h.home) < HOME_RADIUS_KM) state = 'HOME';
  else state = 'PARKED';

  return { empty: false, latest, ageMin, distHome, miles, farthest, state };
}

function stateLabel(s) {
  return s === 'NOTHEARD' ? 'Not heard' : s.charAt(0) + s.slice(1).toLowerCase();
}
function ageText(min) {
  if (min < 1) return 'Heard just now';
  if (min < 60) return 'Heard ' + Math.round(min) + ' min ago';
  const hr = Math.floor(min/60);
  if (hr < 24) {
    const m = Math.round(min%60);
    return 'Heard ' + hr + 'h ' + (m ? m + 'm ' : '') + 'ago';
  }
  const d = Math.floor(hr/24), rh = hr%24;
  return 'Heard ' + d + 'd ' + (rh ? rh + 'h ' : '') + 'ago';
}

/* ============================================================
   RENDER LOOP  -  always-visible age-graded trails + traveling pulse
   ============================================================ */
function ll(p) { return map.latLngToContainerPoint([p.lat, p.lng]); }

// Shift a projected polyline sideways by `off` pixels, using the averaged
// normals of adjacent segments so corners stay joined (transit-map offset).
function offsetPolyline(proj, off) {
  if (!off || proj.length < 2) return proj;
  const n = proj.length;
  const segNx = [], segNy = [];
  for (let i = 0; i < n - 1; i++) {
    const dx = proj[i+1].x - proj[i].x, dy = proj[i+1].y - proj[i].y;
    const len = Math.hypot(dx, dy);
    if (len < 0.0001) { segNx.push(null); segNy.push(null); }
    else { segNx.push(-dy/len); segNy.push(dx/len); }
  }
  // fill degenerate segments with a neighbor's normal
  let lastX = 0, lastY = -1;
  for (let i = 0; i < n - 1; i++) {
    if (segNx[i] === null) { segNx[i] = lastX; segNy[i] = lastY; }
    else { lastX = segNx[i]; lastY = segNy[i]; }
  }
  const out = new Array(n);
  for (let i = 0; i < n; i++) {
    let nx, ny;
    if (i === 0)          { nx = segNx[0];   ny = segNy[0]; }
    else if (i === n - 1) { nx = segNx[n-2]; ny = segNy[n-2]; }
    else {
      nx = segNx[i-1] + segNx[i];
      ny = segNy[i-1] + segNy[i];
      const len = Math.hypot(nx, ny);
      if (len < 0.0001) { nx = segNx[i]; ny = segNy[i]; }
      else { nx /= len; ny /= len; }
    }
    out[i] = { x: proj[i].x + nx*off, y: proj[i].y + ny*off };
  }
  return out;
}

function renderLoop(nowMs) {
  if (nowMs - lastDrawMs >= FRAME_MIN_MS) {
    lastDrawMs = nowMs;
    drawTrails();
    drawAvatars();
  }
  requestAnimationFrame(renderLoop);
}

function drawTrails() {
  const w = trailCanvas.clientWidth, h = trailCanvas.clientHeight;
  ctx.clearRect(0, 0, w, h);
  const now = Date.now();
  const windowMs = TRAIL_HOURS * 3600 * 1000;

  hosts.forEach((host, hi) => {
    const pts = host.track;
    if (!pts || pts.length < 2) return;

    // project once per frame, then shift sideways per host so overlapping
    // routes render as parallel ribbons instead of stacking
    const off = (hi - (hosts.length - 1) / 2) * TRAIL_OFFSET_PX;
    const proj = offsetPolyline(pts.map(p => ll(p)), off);

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Host-colored trail; age is expressed as fade + taper.
    // Fresh segments are bright and full width, 72h-old segments are
    // thin and nearly transparent. Two passes: soft glow, then core.
    for (let pass = 0; pass < 2; pass++) {
      for (let i = 1; i < proj.length; i++) {
        const t = Math.min(1, (now - pts[i].time) / windowMs);  // 0 fresh -> 1 old
        const fade = Math.pow(1 - t, 1.15);
        const alpha = (pass === 0 ? CASING_ALPHA : 0.95) * fade;
        if (alpha < 0.02) continue;
        ctx.strokeStyle = hexA(host.color, alpha);
        ctx.lineWidth = pass === 0
          ? CASING_WIDTH
          : (TRAIL_WIDTH * (0.55 + 0.45 * fade));
        ctx.beginPath();
        ctx.moveTo(proj[i-1].x, proj[i-1].y);
        ctx.lineTo(proj[i].x, proj[i].y);
        ctx.stroke();
      }
    }

    // midnight ticks: small cream dots where the local day rolls over
    if (MIDNIGHT_TICKS) {
      ctx.fillStyle = 'rgba(253,248,229,0.85)';
      let prevDay = new Date(pts[0].time).getDate();
      for (let i = 1; i < pts.length; i++) {
        const d = new Date(pts[i].time).getDate();
        if (d !== prevDay) {
          ctx.beginPath();
          ctx.arc(proj[i].x, proj[i].y, 3, 0, Math.PI*2);
          ctx.fill();
          prevDay = d;
        }
      }
    }

    // traveling pulse: a bright dot running tail -> head, offset per host
    const hostOffset = (host.call.charCodeAt(0) % 7) / 7;
    const tt = ((performance.now()/1000 / PULSE_PERIOD_S) + hostOffset) % 1;
    const fi = tt * (proj.length - 1);
    const i0 = Math.floor(fi), f = fi - i0;
    const i1 = Math.min(i0 + 1, proj.length - 1);
    const px = proj[i0].x + (proj[i1].x - proj[i0].x) * f;
    const py = proj[i0].y + (proj[i1].y - proj[i0].y) * f;
    ctx.beginPath();
    ctx.fillStyle = hexA(host.color, 0.30);
    ctx.arc(px, py, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.fillStyle = 'rgba(253,248,229,0.95)';
    ctx.arc(px, py, 3.2, 0, Math.PI*2); ctx.fill();

    // head: soft halo + solid core in host color (plain fills, no shadowBlur)
    const head = proj[proj.length - 1];
    ctx.beginPath(); ctx.fillStyle = hexA(host.color, 0.25);
    ctx.arc(head.x, head.y, 10, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.fillStyle = hexA(host.color, 0.95);
    ctx.arc(head.x, head.y, 5, 0, Math.PI*2); ctx.fill();
  });
}

/* ---------- avatars (always at the latest position) ---------- */
const markerEls = {};
function drawAvatars() {
  hosts.forEach(host => {
    let el = markerEls[host.call];
    if (!el) {
      el = document.createElement('div');
      el.className = 'host-marker';
      el.style.setProperty('--hc', host.color);
      el.innerHTML = `
        <div class="center">
          <div class="host-ring"></div>
          <div class="host-beam"></div>
          <div class="host-body"><div class="host-avatar"><img class="pose" alt=""><span class="ini">${host.initials || ''}</span></div></div>
          <div class="host-tag">${host.call}</div>
        </div>`;
      avatarLayer.appendChild(el);
      markerEls[host.call] = el;
    }
    const d = deriveHost(host);
    if (d.empty) { el.style.display = 'none'; return; }
    el.style.display = '';

    const pt = ll(d.latest);
    el.style.transform = `translate3d(${pt.x}px, ${pt.y}px, 0)`;
    el.querySelector('.host-beam').style.setProperty('--course', (d.latest.course||0) + 'deg');

    setPose(el.querySelector('.host-avatar'), poseFor(host, d.state));

    el.classList.toggle('rolling', d.state === 'ROLLING');
    el.classList.toggle('dim', d.state === 'NOTHEARD');
  });
}

/* ============================================================
   MASTER TICK  -  clock, cards, footer, poll
   ============================================================ */
function masterTick() {
  tickCount++;

  const now = new Date();
  const zz = String(now.getUTCHours()).padStart(2,'0') + ':' +
             String(now.getUTCMinutes()).padStart(2,'0') + ':' +
             String(now.getUTCSeconds()).padStart(2,'0');
  document.getElementById('zulu').innerHTML = zz + '<span class="z">Z</span>';
  document.getElementById('local').textContent =
    now.toLocaleDateString([], { weekday:'short', month:'short', day:'numeric' }) + '  ' +
    now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

  hosts.forEach(host => {
    const card = document.getElementById('card-' + host.call);
    if (!card) return;
    const d = deriveHost(host);
    if (d.empty) return;
    card.className = 'card' + (d.state==='NOTHEARD' ? ' notheard' : '');
    card.style.setProperty('--hc', host.color);

    const pill = card.querySelector('[data-state]');
    pill.className = 'state-pill state-' + d.state;
    const city = nearestCity(d.latest);
    card.querySelector('[data-statetext]').textContent =
      d.state === 'ROLLING' ? 'Rolling \u00b7 ' + city : city;
    card.querySelector('[data-heard]').textContent = ageText(d.ageMin);
    setPose(card.querySelector('.avatar'), poseFor(host, d.state));

    card.querySelector('[data-miles]').innerHTML = d.miles.toFixed(1) + '<small>mi</small>';
    card.querySelector('[data-far]').innerHTML   = d.farthest.toFixed(1) + '<small>mi</small>';
    card.querySelector('[data-dist]').innerHTML  = d.distHome.toFixed(1) + '<small>mi</small>';
  });

  const ageMin = (Date.now() - dataGeneratedMs) / 60000;
  document.getElementById('srcText').textContent = sourceLabel;
  document.getElementById('updated').textContent =
    'Last update ' + (ageMin < 1 ? 'just now' : Math.round(ageMin) + ' min ago');
  document.getElementById('staleBadge').classList.toggle('show',
    sourceLabel.startsWith('Live') && ageMin > DATA_STALE_MIN);

  if (tickCount % POLL_SECONDS === 0) loadData();
}

/* ============================================================
   BOOT
   ============================================================ */
async function boot() {
  initMap();
  await loadData();
  frameBounds();
  lastFitSig = fitSignature();
  masterTick();
  setInterval(masterTick, MASTER_TICK_MS);
  requestAnimationFrame(renderLoop);
}
window.addEventListener('load', boot);
</script>
</body>
</html>
